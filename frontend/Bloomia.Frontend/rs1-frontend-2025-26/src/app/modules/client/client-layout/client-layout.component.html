<div class="client-header">
    <div class="navbar">
        <div class="hero-content">
                <div class="hero-text">
                    <div class="logo-container">
                        <h1 class="brand-name">Bloomia</h1>
                    </div>
                </div>

            <div class="hero-buttons"> 
                <div class="floating-card home-card" routerLink="/client/home", routerLinkActive="active">
                    <mat-icon>home</mat-icon>
                    <span>Home</span> 
                </div>
                <div class="floating-card therapists-card" routerLink="/client/list-therapists" routerLinkActive="active">
                    <mat-icon>person</mat-icon>
                    <span>Therapists</span> 
                </div>
                <div class="floating-card selfTests-card" routerLink="/client/self-tests" routerLinkActive="active">
                    <mat-icon>list</mat-icon>
                    <span>Self-Tests</span> 
                </div>
                <div class="floating-card selfTests-card" routerLink="/client/saved-therapists" routerLinkActive="active">
                    <mat-icon>list</mat-icon>
                    <span>Saved therapists</span> 
                </div>

                <div class="floating-card profile-card" [matMenuTriggerFor]="userMenu">
                    <mat-icon>person</mat-icon>
                    <span>My Profile</span> 
                    <mat-icon class="dropdown-icon">arrow_drop_down</mat-icon>
                </div>

                <mat-menu #userMenu="matMenu" class="profile-menu">
                    <button mat-menu-item routerLink="/client/my-profile">
                        <mat-icon>person</mat-icon>
                        <span>View Profile</span>
                    </button>
                    
                    <mat-divider></mat-divider>
                    
                    <button mat-menu-item (click)="onLogout()" class="logout-item">
                        <mat-icon>logout</mat-icon>
                        <span>Logout</span>
                    </button>
                </mat-menu>
                
            </div>
        </div>
    </div>

</div>

<router-outlet>

</router-outlet>
