<div class="therapist-layout-container">
    <nav class="navbar">
    <div class="hero-content">
            <div class="hero-text">
                <div class="logo-container">
                    <h1 class="brand-name">Bloomia</h1>
                </div>
            </div>

        <div class="hero-image"> 
            <div class="floating-card home-card" routerLink="/therapist/home" routerLinkActive="active">      
                <mat-icon>home</mat-icon>
                <span>Home</span> 
            </div>

            <div class="floating-card clients-card" routerLink="/therapist/clients" routerLinkActive="active">      
                <mat-icon>supervisor_account</mat-icon>
                <span>My Clients</span> 
            </div>

            <div class="floating-card profile-card" [matMenuTriggerFor]="userMenu">
                <mat-icon>account_circle</mat-icon>
                <span>My Profile</span> 
                <mat-icon class="dropdown-icon">arrow_drop_down</mat-icon>
            </div>

            <mat-menu #userMenu="matMenu" class="profile-menu">
                <button mat-menu-item routerLink="/therapist/my-profile">
                    <mat-icon>person</mat-icon>
                    <span>View Profile</span>
                </button>
                
                <mat-divider></mat-divider>
                
                <button mat-menu-item (click)="onLogout()" class="logout-item">
                    <mat-icon>logout</mat-icon>
                    <span>Logout</span>
                </button>
            </mat-menu>
      </div>
    </div>
    </nav>

    <main class="main-content">
        <router-outlet></router-outlet>
    </main>
</div>
